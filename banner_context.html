<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Predictability Builds Stability</title>
<style>
:root{
  --w:1584px;
  --h:199px;
  --navy:#000C48;
  --deep:#211499;
  --turq:#3FC2C2;
  --neon:#63F8EF;
  --soft:#E9FCFC;
  --white:#FFFFFF;
}

*{box-sizing:border-box}
html,body{
  margin:0;
  background:transparent;
  font-family:Inter,"Segoe UI",Arial,sans-serif;
}

.banner{
  width:1584px;
  height:199px;
  margin:0 auto;
  position:relative;
  overflow:hidden;
  border-radius:18px;
  background:
    radial-gradient(circle at 16% 50%, rgba(99,248,239,.14), transparent 24%),
    radial-gradient(circle at 82% 22%, rgba(63,194,194,.12), transparent 26%),
    linear-gradient(135deg, #000c48 0%, #17108a 44%, #211499 100%);
  box-shadow:0 16px 44px rgba(0,0,0,.18);
  isolation:isolate;
}

/* ambient structure */
.grid{
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:42px 42px;
  opacity:.28;
  animation:gridFloat 12s linear infinite;
  mask-image:linear-gradient(90deg, transparent 0, black 8%, black 92%, transparent 100%);
}
@keyframes gridFloat{
  from{transform:translateX(0)}
  to{transform:translateX(-42px)}
}

.glow-orb{
  position:absolute;
  border-radius:50%;
  filter:blur(22px);
  opacity:.22;
  pointer-events:none;
}
.orb1{
  width:170px;height:170px; left:-30px; top:14px;
  background:var(--neon);
  animation:orbPulse 6s ease-in-out infinite;
}
.orb2{
  width:140px;height:140px; right:80px; bottom:-30px;
  background:var(--turq);
  animation:orbPulse 7s ease-in-out infinite reverse;
}
@keyframes orbPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.12)}
}

.content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  padding:24px 42px;
}

.left{
  width:58%;
  min-width:0;
}

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:8px 14px;
  margin-bottom:12px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  color:rgba(255,255,255,.88);
  font-size:11px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  backdrop-filter: blur(4px);
}
.eyebrow .pulse{
  width:8px;height:8px;border-radius:50%;
  background:var(--neon);
  box-shadow:0 0 10px rgba(99,248,239,.55);
  animation:blink 1.8s ease-in-out infinite;
}
@keyframes blink{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.55;transform:scale(.85)}
}

.title{
  margin:0;
  font-size:46px;
  line-height:1;
  font-weight:900;
  letter-spacing:-.03em;
  color:#fff;
  text-shadow:0 6px 24px rgba(0,0,0,.22);
}
.title .accent{
  color:var(--neon);
  position:relative;
  display:inline-block;
}
.title .accent::after{
  content:"";
  position:absolute;
  left:0; right:0; bottom:-4px;
  height:8px;
  border-radius:999px;
  background:linear-gradient(90deg, rgba(99,248,239,.45), rgba(99,248,239,0));
  animation:underlineGlow 3s ease-in-out infinite;
}
@keyframes underlineGlow{
  0%,100%{opacity:.55;transform:scaleX(.92)}
  50%{opacity:1;transform:scaleX(1)}
}

.sub{
  margin-top:12px;
  max-width:760px;
  font-size:15px;
  line-height:1.45;
  color:rgba(255,255,255,.84);
}

.right{
  width:38%;
  min-width:330px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

/* premium system panel */
.panel{
  position:relative;
  width:470px;
  height:146px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 18px 36px rgba(0,0,0,.18);
  backdrop-filter: blur(8px);
  overflow:hidden;
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg, rgba(99,248,239,.06), transparent 32%, transparent 68%, rgba(99,248,239,.04));
  pointer-events:none;
}

/* hub */
.hub{
  position:absolute;
  left:50%;
  top:50%;
  width:84px;
  height:84px;
  transform:translate(-50%,-50%);
  border-radius:24px;
  background:linear-gradient(180deg, rgba(99,248,239,.18), rgba(255,255,255,.08));
  border:1px solid rgba(99,248,239,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 0 10px rgba(99,248,239,.08),
    0 12px 28px rgba(0,0,0,.16);
  animation:hubFloat 3.6s ease-in-out infinite;
}
@keyframes hubFloat{
  0%,100%{transform:translate(-50%,-50%)}
  50%{transform:translate(-50%,-53%)}
}

.hub svg{
  width:42px;
  height:42px;
  stroke:var(--neon);
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 8px rgba(99,248,239,.24));
}

.hub-label{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,54px);
  font-size:10px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,.86);
  white-space:nowrap;
}

/* four meaning cards */
.mini{
  position:absolute;
  width:138px;
  height:42px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 11px;
  color:#fff;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
  backdrop-filter: blur(4px);
}

.mini .icon{
  width:22px;height:22px;border-radius:8px;
  background:rgba(99,248,239,.12);
  border:1px solid rgba(99,248,239,.24);
  display:grid;place-items:center;
  flex:0 0 auto;
}

.mini .icon svg{
  width:13px;height:13px;
  stroke:var(--neon);
  fill:none;
  stroke-width:2.1;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.mini .txt{
  font-size:11px;
  line-height:1.1;
  font-weight:700;
  color:rgba(255,255,255,.9);
}

.m1{ left:18px; top:14px; animation:cardReveal 6s ease-in-out infinite 0s; }
.m2{ right:18px; top:14px; animation:cardReveal 6s ease-in-out infinite 1.1s; }
.m3{ left:18px; bottom:14px; animation:cardReveal 6s ease-in-out infinite 2.2s; }
.m4{ right:18px; bottom:14px; animation:cardReveal 6s ease-in-out infinite 3.3s; }

@keyframes cardReveal{
  0%,100%{ transform:translateY(0); opacity:.68; }
  12%{ transform:translateY(-2px); opacity:1; box-shadow:0 0 0 1px rgba(99,248,239,.14), 0 12px 24px rgba(0,0,0,.14); }
  24%{ transform:translateY(0); opacity:.86; }
}

/* connector lines */
.connector{
  position:absolute;
  height:2px;
  background:linear-gradient(90deg, rgba(99,248,239,.85), rgba(99,248,239,.12));
  transform-origin:left center;
  overflow:hidden;
  border-radius:999px;
}
.connector::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
  transform:translateX(-100%);
  animation:signal 3.6s linear infinite;
}
@keyframes signal{
  to{ transform:translateX(100%); }
}

.c1{ width:92px; left:126px; top:35px; transform:rotate(12deg); }
.c2{ width:92px; right:126px; top:35px; transform:rotate(-12deg); }
.c3{ width:92px; left:126px; bottom:35px; transform:rotate(-12deg); }
.c4{ width:92px; right:126px; bottom:35px; transform:rotate(12deg); }

@media (max-width:1180px){
  .content{padding:24px 24px;}
  .title{font-size:38px;}
  .right{display:none;}
  .left{width:100%;}
}

@media (max-width:760px){
  .banner{height:auto; min-height:199px; width:100%;}
  .content{padding:20px 16px 24px;}
  .title{font-size:31px;}
  .sub{font-size:14px;}
}
</style>
</head>
<body>
  <div class="banner" role="img" aria-label="Predictability Builds Stability banner">
    <div class="grid"></div>
    <div class="glow-orb orb1"></div>
    <div class="glow-orb orb2"></div>

    <div class="content">
      <div class="left">
        <div class="eyebrow">
          <span class="pulse"></span>
          Context Trust
        </div>

        <h1 class="title">
          <span class="accent">Predictability</span> Builds Stability
        </h1>

        <div class="sub">
          When expectations, responsibilities, and decisions are clear, people feel confident about how work moves forward.
        </div>
      </div>

      <div class="right">
        <div class="panel">
          <div class="connector c1"></div>
          <div class="connector c2"></div>
          <div class="connector c3"></div>
          <div class="connector c4"></div>

          <div class="mini m1">
            <div class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M4 12h16"></path>
                <path d="M12 4v16"></path>
              </svg>
            </div>
            <div class="txt">What is expected</div>
          </div>

          <div class="mini m2">
            <div class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M6 8h12"></path>
                <path d="M8 12h8"></path>
                <path d="M10 16h4"></path>
              </svg>
            </div>
            <div class="txt">How decisions are made</div>
          </div>

          <div class="mini m3">
            <div class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M7 12l3 3 7-7"></path>
                <rect x="4" y="4" width="16" height="16" rx="3"></rect>
              </svg>
            </div>
            <div class="txt">What standards apply</div>
          </div>

          <div class="mini m4">
            <div class="icon">
              <svg viewBox="0 0 24 24">
                <path d="M12 3v10"></path>
                <path d="M8 9l4 4 4-4"></path>
                <path d="M5 19h14"></path>
              </svg>
            </div>
            <div class="txt">How accountability works</div>
          </div>

          <div class="hub">
            <svg viewBox="0 0 24 24">
              <path d="M12 3l7 4v5c0 4.2-2.7 7.3-7 9-4.3-1.7-7-4.8-7-9V7l7-4z"></path>
              <path d="M9.5 12.5l2 2 3.5-4"></path>
            </svg>
          </div>
          <div class="hub-label">Stable Trust System</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
